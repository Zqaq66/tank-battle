<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Tank Battle</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: #16213e;
            --text: #e0e0e0;
            --accent: #e94560;
            --gold: #f5c518;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: stretch;
            padding: 20px;
        }

        .game-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 200px;
        }

        .panel-title {
            font-size: 1.4em;
            font-weight: bold;
            color: var(--gold);
            text-align: center;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 12px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text);
            font-size: 1em;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            opacity: 0.7;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.2em;
            color: var(--gold);
        }

        .lives-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .life-icon {
            width: 20px;
            height: 20px;
            background: var(--accent);
            clip-path: polygon(50% 0%, 100% 35%, 85% 100%, 15% 100%, 0% 35%);
        }

        .game-canvas-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--accent);
        }

        canvas {
            display: block;
            background: #0a0a0a;
        }

        .controls {
            color: var(--text);
            font-size: 0.85em;
            line-height: 1.8;
            opacity: 0.8;
        }

        .controls kbd {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: 2px 8px;
            font-family: inherit;
            font-size: 0.9em;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 68, 96, 0.4);
        }

        .btn-select {
            background: #7c3aed;
        }
        .btn-select:hover {
            background: #8b5cf6;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }

        .btn-pause {
            background: #0891b2;
        }
        .btn-pause:hover {
            background: #06b6d4;
            box-shadow: 0 4px 12px rgba(8, 145, 178, 0.4);
        }

        .btn-restart {
            background: var(--accent);
        }
        .btn-restart:hover {
            background: #ff5a7a;
        }

        .btn:active {
            transform: translateY(0);
        }

        .pause-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
            z-index: 9;
        }

        .pause-overlay.active {
            display: flex;
        }

        .pause-icon {
            font-size: 3em;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .pause-text {
            font-size: 1.5em;
            font-weight: bold;
            color: #f5c518;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        .game-over-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: white;
            font-size: 2em;
            font-weight: bold;
            z-index: 10;
        }

        .game-over-overlay.active {
            display: flex;
        }

        .game-over-overlay .sub {
            font-size: 0.5em;
            opacity: 0.7;
        }

        .level-select-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 11;
            padding: 20px;
        }

        .level-select-overlay.active {
            display: flex;
        }

        .level-select-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #f5c518;
            text-shadow: 0 0 20px rgba(245, 197, 24, 0.5);
        }

        .level-select-sub {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: -10px;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 500px;
            width: 100%;
        }

        .level-btn {
            background: linear-gradient(135deg, #1e3a5f, #16213e);
            color: #e0e0e0;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 14px 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.2s;
            text-align: center;
        }

        .level-btn:hover,
        .level-btn.focused {
            border-color: #f5c518;
            color: #f5c518;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(245, 197, 24, 0.3);
            background: linear-gradient(135deg, #2a4a7f, #1e3050);
        }

        .level-btn .lv-num {
            font-size: 1.4em;
            display: block;
        }

        .level-btn .lv-name {
            font-size: 0.7em;
            opacity: 0.7;
            display: block;
            margin-top: 2px;
        }

        .level-btn.easy {
            border-color: rgba(74, 222, 128, 0.4);
        }
        .level-btn.medium {
            border-color: rgba(250, 204, 21, 0.4);
        }
        .level-btn.hard {
            border-color: rgba(248, 113, 113, 0.4);
        }
        .level-btn.expert {
            border-color: rgba(167, 139, 250, 0.4);
        }

        @media (max-width: 900px) {
            .game-wrapper {
                flex-direction: column-reverse;
                align-items: center;
            }
            .game-panel {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                min-width: auto;
                gap: 12px;
                padding: 16px;
            }
            .panel-title {
                width: 100%;
                font-size: 1.1em;
            }
            .stat-item {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">

            </div>
            <div class="stat-item">
                <span class="stat-label">📊 关卡</span>

            </div>
            <div class="stat-item">

            </div>
            <div class="stat-item">

            </div>
            <button class="btn btn-select" id="selectLevelBtn">📋 选择关卡</button>
            <button class="btn btn-pause" id="pauseBtn">⏯️ 暂停 / 继续</button>
            <button class="btn btn-restart" id="restartBtn">🔄 重新开始</button>
            <div class="controls">
                <strong>操作说明:</strong><br>
                <kbd>↑↓←→</kbd> / <kbd>WASD</kbd> 移动<br>
                <kbd>空格</kbd> 发射子弹<br>
                <kbd>ESC</kbd> / <kbd>P</kbd> 暂停<br>
                <kbd>R</kbd> 重新开始
            </div>
        </div>

        <!-- Game Canvas -->
        <div class="game-canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div class="game-over-overlay" id="gameOverOverlay">
                <div id="gameOverTitle">GAME OVER</div>
                <div class="sub">按 R 键重新开始</div>
            </div>
            <div class="pause-overlay" id="pauseOverlay">
                <div class="pause-icon">⏸️</div>
                <div class="pause-text">游戏暂停</div>
                <div class="sub">按 ESC 或 P 键继续</div>
            </div>
            <div class="level-select-overlay" id="levelSelectOverlay">

                <div class="level-select-sub">方向键选择 · 空格/回车确认 · ESC返回</div>
                <div class="level-grid" id="levelGrid"></div>
            </div>
        </div>
    </div>

                return ALL_MAPS[idx].map(row => row.split('').map(Number));
            }

            function getLevelConfig(lvl) {
                return LEVEL_CONFIG[(lvl - 1) % LEVEL_CONFIG.length];
            }

            // Tank base class
            class Tank {
                constructor(x, y, dir, color, speed) {
                    this.x = x;
                    this.y = y;
                    this.dir = dir;
                    this.color = color;
                    this.speed = speed;
                    this.width = TILE_SIZE - 4;
                    this.height = TILE_SIZE - 4;
                    this.reloadTime = 0;
                    this.reloadMax = 30;
                    this.active = true;
                    this.flashTimer = 0;
                    this.invincible = 0;
                }

                getCenterX() { return this.x + this.width / 2; }
                getCenterY() { return this.y + this.height / 2; }

                getBounds() {
                    return {
                        left: this.x,
                        right: this.x + this.width,
                        top: this.y,
                        bottom: this.y + this.height
                    };
                }

                collidesWith(other) {
                    const a = this.getBounds();
                    const b = other.getBounds();
                    return !(a.right <= b.left || a.left >= b.right ||
                        a.bottom <= b.top || a.top >= b.bottom);
                }

                collidesWithWalls(walls) {
                    const b = this.getBounds();
                    const tileLeft = Math.floor(b.left / TILE_SIZE);
                    const tileRight = Math.floor((b.right - 0.01) / TILE_SIZE);
                    const tileTop = Math.floor(b.top / TILE_SIZE);
                    const tileBottom = Math.floor((b.bottom - 0.01) / TILE_SIZE);

                    for (let row = tileTop; row <= tileBottom; row++) {
                        for (let col = tileLeft; col <= tileRight; col++) {
                            if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return true;
                            const wall = walls[row][col];
                            if (wall === 1 || wall === 2) return true;
                        }
                    }
                    return false;
                }

                collidesWithCanvas() {
                    const b = this.getBounds();
                    return b.left < 0 || b.right > CANVAS_WIDTH ||
                        b.top < 0 || b.bottom > CANVAS_HEIGHT;
                }

                collidesWithTank(other) {
                    if (other === this || !other.active) return false;
                    // For same tank, allow slight overlap for smoother gameplay
                    const a = this.getBounds();
                    const b = other.getBounds();
                    const marginX = 2;
                    const marginY = 2;
                    return !(a.right - marginX <= b.left + marginX ||
                        a.left + marginX >= b.right - marginX ||
                        a.bottom - marginY <= b.top + marginY ||
                        a.top + marginY >= b.bottom - marginY);
                }
            }

            // Player class
            class Player extends Tank {
                constructor() {
                    super(TILE_SIZE * 4.5, CANVAS_HEIGHT - TILE_SIZE * 2, DIR.UP, '#4ade80', 2);
                    this.reloadMax = 20;
                    this.invincible = 60; // 1 second invincibility at start
                }

                respawn() {
                    this.x = TILE_SIZE * 4.5;
                    this.y = CANVAS_HEIGHT - TILE_SIZE * 2;
                    this.dir = DIR.UP;
                    this.invincible = 120; // 2 seconds invincibility after death
                    this.active = true;
                }
            }

            // Enemy class
            class Enemy extends Tank {
                constructor(x, y, type) {
                    const colors = ['#f87171', '#fb923c', '#facc15', '#a78bfa'];
                    const speeds = [1, 1.3, 1.6, 1.2];
                    const reloads = [60, 45, 35, 50];
                    const points = [100, 200, 300, 400];
                    const t = type % colors.length;
                    super(x, y, DIR.DOWN, colors[t], speeds[t]);
                    this.type = t;
                    this.reloadMax = reloads[t];
                    this.reloadTime = Math.random() * reloads[t];
                    this.points = points[t];
                    this.dirChangeTimer = 0;
                    this.dirChangeInterval = 60 + Math.random() * 60;
                }

                updateAI(walls, player, enemies) {
                    if (!this.active) return;

                    this.flashTimer = Math.max(0, this.flashTimer - 1);
                    this.invincible = Math.max(0, this.invincible - 1);

                    this.dirChangeTimer--;

                    // Random direction change
                    if (this.dirChangeTimer <= 0) {
                        this.dirChangeTimer = this.dirChangeInterval;
                        // Sometimes chase player
                        if (Math.random() < 0.4 && player.active) {
                            const dx = player.getCenterX() - this.getCenterX();
                            const dy = player.getCenterY() - this.getCenterY();
                            if (Math.abs(dx) > Math.abs(dy)) {
                                this.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
                            } else {
                                this.dir = dy > 0 ? DIR.DOWN : DIR.UP;
                            }
                        } else {
                            this.dir = Math.floor(Math.random() * 4);
                        }
                    }

                    // Shoot
                    this.reloadTime--;
                    if (this.reloadTime <= 0 && Math.random() < 0.6) {
                        this.reloadTime = this.reloadMax;
                        return this.shoot();
                    }

                    // Move
                    const v = DIR_VECTORS[this.dir];
                    const prevX = this.x;
                    const prevY = this.y;
                    this.x += v.x * this.speed;
                    this.y += v.y * this.speed;

                    if (this.collidesWithCanvas() || this.collidesWithWalls(walls)) {
                        this.x = prevX;
                        this.y = prevY;
                        this.dirChangeTimer = 0; // Force direction change
                    }

                    // Check collision with other tanks
                    for (const other of [...enemies, player]) {
                        if (other !== this && other.active && this.collidesWithTank(other)) {
                            this.x = prevX;
                            this.y = prevY;
                            this.dirChangeTimer = 0;
                            break;
                        }
                    }
                }

                shoot() {
                    const cx = this.getCenterX();
                    const cy = this.getCenterY();
                    const v = DIR_VECTORS[this.dir];
                    return new Bullet(
                        cx + v.x * (this.width / 2) - 3,
                        cy + v.y * (this.height / 2) - 3,
                        this.dir, false
                    );
                }
            }

            // Bullet class
            class Bullet {
                constructor(x, y, dir, isPlayer) {
                    this.x = x;
                    this.y = y;
                    this.dir = dir;
                    this.isPlayer = isPlayer;
                    this.speed = isPlayer ? 4 : 3;
                    this.width = 6;
                    this.height = 6;
                    this.active = true;
                }

                update() {
                    const v = DIR_VECTORS[this.dir];
                    this.x += v.x * this.speed;
                    this.y += v.y * this.speed;

                    if (this.x < -10 || this.x > CANVAS_WIDTH + 10 ||
                        this.y < -10 || this.y > CANVAS_HEIGHT + 10) {
                        this.active = false;
                    }
                }

                getBounds() {
                    return {
                        left: this.x,
                        right: this.x + this.width,
                        top: this.y,
                        bottom: this.y + this.height
                    };
                }

                hitsWall(walls) {
                    const b = this.getBounds();
                    const col = Math.floor((b.left + b.right) / 2 / TILE_SIZE);
                    const row = Math.floor((b.top + b.bottom) / 2 / TILE_SIZE);
                    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
                    return walls[row][col] === 1 || walls[row][col] === 2;
                }

                getWallHit(walls) {
                    const b = this.getBounds();
                    const col = Math.floor((b.left + b.right) / 2 / TILE_SIZE);
                    const row = Math.floor((b.top + b.bottom) / 2 / TILE_SIZE);
                    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return null;
                    if (walls[row][col] === 1 || walls[row][col] === 2) {
                        return { row, col, type: walls[row][col] };
                    }
                    return null;
                }
            }

            // Particle class
            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.life = 20;
                    this.maxLife = 20;
                    this.vx = (Math.random() - 0.5) * 4;
                    this.vy = (Math.random() - 0.5) * 4;
                    this.size = 2 + Math.random() * 4;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life--;
                    return this.life > 0;
                }

                draw(ctx) {
                    const alpha = this.life / this.maxLife;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                    ctx.globalAlpha = 1;
                }
            }

            function spawnParticles(x, y, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y, color));
                }
            }

            // Initialize/reset game state
            function initGame() {
                const cfg = getLevelConfig(level);
                const map = getLevelMap(level);
                walls = map.map(row => [...row]);
                player = new Player();
                enemies = [];
                bullets = [];
                particles = [];
                gameOver = false;
                gamePaused = false;
                enemySpawnTimer = 0;
                enemiesPerLevel = cfg.enemies;
                maxActiveEnemies = cfg.maxActive;
                enemiesRemaining = cfg.enemies;
                enemiesSpawned = 0;
                spawnDelay = cfg.spawnDelay;
                updateUI();
                gameOverOverlay.classList.remove('active');
                levelSelectOverlay.classList.remove('active');
                pauseOverlay.classList.remove('active');

                // Pre-spawn initial enemies for immediate action
                const preSpawn = Math.min(2, cfg.maxActive);
                for (let i = 0; i < preSpawn; i++) {
                    spawnEnemy();
                }
            }

            function spawnEnemy() {
                const spawnPoints = [
                    { x: 0, y: 0 },
                    { x: CANVAS_WIDTH / 2 - TILE_SIZE, y: 0 },
                    { x: CANVAS_WIDTH - TILE_SIZE + 4, y: 0 },
                ];

                const pt = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
                const cfg = getLevelConfig(level);
                const typeRange = cfg.maxType - cfg.minType + 1;
                const type = cfg.minType + Math.floor(Math.random() * typeRange);
                const enemy = new Enemy(pt.x, pt.y, type);

                // Check spawning area is clear
                let blocked = false;
                if (enemy.collidesWithWalls(walls)) blocked = true;
                for (const e of enemies) {
                    if (enemy.collidesWithTank(e)) { blocked = true; break; }
                }
                if (player.active && enemy.collidesWithTank(player)) blocked = true;

                if (!blocked) {
                    enemies.push(enemy);
                    enemiesSpawned++;
                    enemiesRemaining--;
                } else {
                    // Try again later
                    enemiesRemaining++;
                }
            }

            function updateUI() {
                const cfg = getLevelConfig(level);
                scoreDisplay.textContent = score;
                levelDisplay.textContent = `${level} - ${cfg.name}`;
                killsDisplay.textContent = kills;
                livesContainer.innerHTML = '';
                for (let i = 0; i < lives; i++) {
                    const icon = document.createElement('span');
                    icon.className = 'life-icon';
                    livesContainer.appendChild(icon);
                }
            }

            function playerShoot() {
                if (!player.active || player.reloadTime > 0) return;
                player.reloadTime = player.reloadMax;
                const cx = player.getCenterX();
                const cy = player.getCenterY();
                const v = DIR_VECTORS[player.dir];
                bullets.push(new Bullet(
                    cx + v.x * (player.width / 2) - 3,
                    cy + v.y * (player.height / 2) - 3,
                    player.dir, true
                ));
            }

            function handleBulletWallCollision(bullet, wallHit) {
                if (wallHit.type === 1) {
                    // Brick wall - destroy it
                    walls[wallHit.row][wallHit.col] = 0;
                    spawnParticles(
                        wallHit.col * TILE_SIZE + TILE_SIZE / 2,
                        wallHit.row * TILE_SIZE + TILE_SIZE / 2,
                        '#d4a574', 6
                    );
                } else if (wallHit.type === 2) {
                    // Steel wall - only player bullets can destroy
                    if (bullet.isPlayer && level >= 3) {
                        walls[wallHit.row][wallHit.col] = 0;
                        spawnParticles(
                            wallHit.col * TILE_SIZE + TILE_SIZE / 2,
                            wallHit.row * TILE_SIZE + TILE_SIZE / 2,
                            '#9ca3af', 8
                        );
                    }
                }
                bullet.active = false;
            }

            function killPlayer() {
                if (player.invincible > 0) return;
                spawnParticles(player.getCenterX(), player.getCenterY(), player.color, 15);
                player.active = false;
                lives--;
                updateUI();

                if (lives <= 0) {
                    endGame(false);
                } else {
                    // Respawn after delay
                    setTimeout(() => {
                        if (!gameOver) player.respawn();
                    }, 1000);
                }
            }

            function endGame(won) {
                gameOver = true;
                if (won) {
                    score += 1000;
                    updateUI();
                    // After winning all 10 levels
                    gameOverOverlay.classList.add('active');
                    gameOverTitle.textContent = '🎉 恭喜通关!';
                } else {
                    gameOverOverlay.classList.add('active');
                    gameOverTitle.textContent = 'GAME OVER';
                }
            }

            function nextLevel() {
                if (level >= 10) {
                    endGame(true);
                    return;
                }
                level++;
                score += 500;
                initGame();
            }

            function restartGame() {
                score = 0;
                level = 1;
                kills = 0;
                lives = 3;
                initGame();
            }

            function selectLevel(lvl) {
                score = 0;
                level = lvl;
                kills = 0;
                lives = 3;
                initGame();
            }

            // Drawing functions
            function drawWall(row, col, type) {
                const x = col * TILE_SIZE;
                const y = row * TILE_SIZE;

                if (type === 1) {
                    // Brick wall
                    ctx.fillStyle = '#b45309';
                    ctx.fillRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                    ctx.fillStyle = '#d97706';
                    ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    // Brick pattern
                    ctx.strokeStyle = '#92400e';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 2, y + 2, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
                    ctx.strokeRect(x + TILE_SIZE / 2, y + 2, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
                    ctx.strokeRect(x + 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
                    ctx.strokeRect(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
                } else if (type === 2) {
                    // Steel wall
                    ctx.fillStyle = '#6b7280';
                    ctx.fillRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                    ctx.fillStyle = '#9ca3af';
                    ctx.fillRect(x + 3, y + 3, TILE_SIZE - 6, TILE_SIZE - 6);
                    ctx.fillStyle = '#d1d5db';
                    ctx.fillRect(x + 5, y + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                    // Bolt pattern
                    ctx.fillStyle = '#4b5563';
                    const r = 3;
                    [
                        [6, 6],
                        [TILE_SIZE - 6, 6],
                        [6, TILE_SIZE - 6],
                        [TILE_SIZE - 6, TILE_SIZE - 6]
                    ].forEach(([bx, by]) => {
                        ctx.beginPath();
                        ctx.arc(x + bx, y + by, r, 0, Math.PI * 2);
                        ctx.fill();
                    });
                } else if (type === 3) {
                    // Water
                    ctx.fillStyle = '#1e40af';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#3b82f6';
                    for (let i = 0; i < 3; i++) {
                        const wy = y + 8 + i * 8;
                        ctx.fillRect(x + 2, wy, TILE_SIZE - 4, 4);
                    }
                } else if (type === 4) {
                    // Forest
                    ctx.fillStyle = '#166534';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#22c55e';
                    ctx.beginPath();
                    ctx.arc(x + TILE_SIZE / 2, y + 8, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + 8, y + 20, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + TILE_SIZE - 8, y + 20, 10, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawTank(tank) {
                if (!tank.active) return;
                if (tank.flashTimer > 0 && tank.flashTimer % 4 < 2) return; // Flash effect (only when hit)
                if (tank.invincible > 0 && tank.invincible % 6 < 3 && tank instanceof Player) return; // Player invincibility blink

                ctx.save();
                ctx.translate(tank.getCenterX(), tank.getCenterY());
                const angle = tank.dir * Math.PI / 2;
                ctx.rotate(angle);

                const hw = tank.width / 2;
                const hh = tank.height / 2;

                // Tank body
                ctx.fillStyle = tank.color;
                ctx.fillRect(-hw + 2, -hh + 2, tank.width - 4, tank.height - 4);

                // Darker border
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(-hw, -hh + 4, tank.width, tank.height - 8);

                // Treads
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(-hw + 1, -hh, tank.width - 2, 5);
                ctx.fillRect(-hw + 1, hh - 5, tank.width - 2, 5);

                // Barrel
                ctx.fillStyle = tank.color;
                const barrelW = 4;
                const barrelH = hh + 6;
                ctx.fillRect(-barrelW / 2, -barrelH, barrelW, barrelH);

                // Turret center
                const isPlayer = tank instanceof Player;
                ctx.fillStyle = isPlayer ? '#fbbf24' : '#ef4444';
                ctx.beginPath();
                ctx.arc(0, 0, 5, 0, Math.PI * 2);
                ctx.fill();

                // Barrel tip
                ctx.fillStyle = isPlayer ? '#fde68a' : '#fca5a5';
                ctx.fillRect(-barrelW / 2 + 1, -barrelH, barrelW - 2, 4);

                ctx.restore();

                // Draw shield effect when invincible
                if (tank.invincible > 0 && tank.invincible % 6 < 3) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(tank.getCenterX(), tank.getCenterY(), hw + 4, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            function drawBullet(bullet) {
                if (!bullet.active) return;
                ctx.fillStyle = bullet.isPlayer ? '#fbbf24' : '#f87171';
                ctx.shadowColor = bullet.isPlayer ? '#fbbf24' : '#f87171';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(
                    bullet.x + bullet.width / 2,
                    bullet.y + bullet.height / 2,
                    3, 0, Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function draw() {
                // Clear
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // Grid lines (subtle)
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for (let x = 0; x <= CANVAS_WIDTH; x += TILE_SIZE) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, CANVAS_HEIGHT);
                    ctx.stroke();
                }
                for (let y = 0; y <= CANVAS_HEIGHT; y += TILE_SIZE) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(CANVAS_WIDTH, y);
                    ctx.stroke();
                }

                // Draw walls
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        if (walls[row][col] > 0) {
                            drawWall(row, col, walls[row][col]);
                        }
                    }
                }

                // Draw bullets
                for (const bullet of bullets) {
                    drawBullet(bullet);
                }

                // Draw enemies
                for (const enemy of enemies) {
                    drawTank(enemy);
                }

                // Draw player
                if (player && player.active) {
                    drawTank(player);
                }

                // Draw particles
                for (const p of particles) {
                    p.draw(ctx);
                }

                // Enemy remaining indicator (only during game)
                if (!gameOver) {
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = '12px "Microsoft YaHei", sans-serif';
                    ctx.fillText(`剩余敌人: ${enemiesRemaining + enemies.length}`, 8, CANVAS_HEIGHT - 8);
                }
            }

            function update() {
                if (gameOver || gamePaused) return;

                // Update player
                if (player.active) {
                    player.reloadTime = Math.max(0, player.reloadTime - 1);
                    player.flashTimer = Math.max(0, player.flashTimer - 1);
                    player.invincible = Math.max(0, player.invincible - 1);

                    let moveDir = null;
                    if (keys['ArrowUp'] || keys['w'] || keys['W']) moveDir = DIR.UP;
                    else if (keys['ArrowDown'] || keys['s'] || keys['S']) moveDir = DIR.DOWN;
                    else if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveDir = DIR.LEFT;
                    else if (keys['ArrowRight'] || keys['d'] || keys['D']) moveDir = DIR.RIGHT;

                    if (moveDir !== null) {
                        player.dir = moveDir;
                        const v = DIR_VECTORS[moveDir];
                        const prevX = player.x;
                        const prevY = player.y;
                        player.x += v.x * player.speed;
                        player.y += v.y * player.speed;

                        if (player.collidesWithCanvas() || player.collidesWithWalls(walls)) {
                            player.x = prevX;
                            player.y = prevY;
                        }

                        // Check collision with enemies
                        for (const enemy of enemies) {
                            if (enemy.active && player.collidesWithTank(enemy)) {
                                player.x = prevX;
                                player.y = prevY;
                                break;
                            }
                        }
                    }

                    if (keys[' '] || keys['Space']) {
                        playerShoot();
                    }
                }

                // Update enemies
                for (const enemy of enemies) {
                    if (enemy.active) {
                        const bullet = enemy.updateAI(walls, player, enemies);
                        if (bullet) bullets.push(bullet);
                    }
                }

                // Update bullets
                for (const bullet of bullets) {
                    if (!bullet.active) continue;
                    bullet.update();

                    // Wall collision
                    const wallHit = bullet.getWallHit(walls);
                    if (wallHit) {
                        handleBulletWallCollision(bullet, wallHit);
                        continue;
                    }
                    if (!bullet.active) continue;

                    // Player bullet hits enemy
                    if (bullet.isPlayer) {
                        for (const enemy of enemies) {
                            if (!enemy.active) continue;
                            const eb = enemy.getBounds();
                            const bb = bullet.getBounds();
                            if (!(bb.right <= eb.left || bb.left >= eb.right ||
                                    bb.bottom <= eb.top || bb.top >= eb.bottom)) {
                                bullet.active = false;
                                spawnParticles(enemy.getCenterX(), enemy.getCenterY(), enemy.color, 12);
                                enemy.active = false;
                                score += enemy.points;
                                kills++;
                                updateUI();
                                break;
                            }
                        }
                    }

                    // Enemy bullet hits player
                    if (!bullet.isPlayer && bullet.active && player.active && player.invincible <= 0) {
                        const pb = player.getBounds();
                        const bb = bullet.getBounds();
                        if (!(bb.right <= pb.left || bb.left >= pb.right ||
                                bb.bottom <= pb.top || bb.top >= pb.bottom)) {
                            bullet.active = false;
                            killPlayer();
                        }
                    }
                }

                // Clean up dead entities
                bullets = bullets.filter(b => b.active);
                enemies = enemies.filter(e => e.active);
                particles = particles.filter(p => p.update());

                // Spawn enemies
                spawnDelay--;
                if (enemiesRemaining > 0 && enemies.length < maxActiveEnemies && spawnDelay <= 0) {
                    spawnEnemy();
                    spawnDelay = 90 + Math.random() * 60;
                }

                // Check level complete
                if (enemiesRemaining <= 0 && enemies.length === 0 && !gameOver) {
                    nextLevel();
                }
            }

            function gameLoop() {
                update();
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }

            // Input handling
            window.addEventListener('keydown', (e) => {
                // Level select keyboard navigation
                const inLevelSelect = levelSelectOverlay.classList.contains('active');
                if (inLevelSelect) {
                    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                        e.preventDefault();
                        const newIdx = selectedLevelIndex - LEVEL_COLS;
                        if (newIdx >= 0) focusLevelButton(newIdx);
                        return;
                    }
                    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                        e.preventDefault();
                        const newIdx = selectedLevelIndex + LEVEL_COLS;
                        if (newIdx < 10) focusLevelButton(newIdx);
                        return;
                    }
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                        e.preventDefault();
                        const newIdx = selectedLevelIndex - 1;
                        if (newIdx >= 0 && Math.floor(newIdx / LEVEL_COLS) === Math.floor(selectedLevelIndex / LEVEL_COLS)) {
                            focusLevelButton(newIdx);
                        }
                        return;
                    }
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                        e.preventDefault();
                        const newIdx = selectedLevelIndex + 1;
                        if (newIdx < 10 && Math.floor(newIdx / LEVEL_COLS) === Math.floor(selectedLevelIndex / LEVEL_COLS)) {
                            focusLevelButton(newIdx);
                        }
                        return;
                    }
                    if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        selectLevel(selectedLevelIndex + 1);
                        return;
                    }
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        // If there's an active game behind, resume it
                        if (player && lives > 0 && !gameOver) {
                            levelSelectOverlay.classList.remove('active');
                            gamePaused = false;
                            // Clear focus
                            const buttons = levelGrid.querySelectorAll('.level-btn');
                            buttons.forEach(b => b.classList.remove('focused'));
                        }
                        return;
                    }
                    return;
                }

                keys[e.key] = true;

                // Pause toggle: ESC or P
                if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
                    if (!levelSelectOverlay.classList.contains('active')) {
                        togglePause();
                    }
                    e.preventDefault();
                    return;
                }

                // Restart or back to menu
                if (e.key === 'r' || e.key === 'R') {
                    if (gameOver) {
                        showLevelSelect();
                    } else {
                        restartGame();
                    }
                    e.preventDefault();
                    return;
                }

                // Prevent scrolling for game keys
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                    e.preventDefault();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                    e.preventDefault();
                }
            });

            // Mobile touch controls
            let touchActive = false;
            let touchDir = null;
            let touchShoot = false;

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchActive = true;
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const tx = touch.clientX - rect.left;
                    const ty = touch.clientY - rect.top;

                    // Right half = shoot
                    if (tx > CANVAS_WIDTH / 2) {
                        touchShoot = true;
                    }

                    // Determine direction based on position relative to center of left half
                    const cx = CANVAS_WIDTH / 4;
                    const cy = CANVAS_HEIGHT / 2;
                    const dx = tx - cx;
                    const dy = ty - cy;

                    if (Math.abs(dx) > Math.abs(dy)) {
                        touchDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
                    } else {
                        touchDir = dy > 0 ? DIR.DOWN : DIR.UP;
                    }
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const tx = touch.clientX - rect.left;
                    const ty = touch.clientY - rect.top;
                    touchShoot = tx > CANVAS_WIDTH / 2;

                    const cx = CANVAS_WIDTH / 4;
                    const cy = CANVAS_HEIGHT / 2;
                    const dx = tx - cx;
                    const dy = ty - cy;
                    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                        if (Math.abs(dx) > Math.abs(dy)) {
                            touchDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
                        } else {
                            touchDir = dy > 0 ? DIR.DOWN : DIR.UP;
                        }
                    }
                }
            });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchActive = false;
                touchDir = null;
                touchShoot = false;
            });

            // Integrate touch into game loop (set keys)
            const origUpdate = update;
            update = function () {
                if (touchActive) {
                    if (touchDir === DIR.UP) keys['ArrowUp'] = true;
                    else keys['ArrowUp'] = false;
                    if (touchDir === DIR.DOWN) keys['ArrowDown'] = true;
                    else keys['ArrowDown'] = false;
                    if (touchDir === DIR.LEFT) keys['ArrowLeft'] = true;
                    else keys['ArrowLeft'] = false;
                    if (touchDir === DIR.RIGHT) keys['ArrowRight'] = true;
                    else keys['ArrowRight'] = false;
                    keys[' '] = touchShoot;
                }
                origUpdate();
            };

            // Build level select grid
            function buildLevelGrid() {
                levelGrid.innerHTML = '';
                for (let i = 0; i < 10; i++) {
                    const cfg = LEVEL_CONFIG[i];
                    const btn = document.createElement('button');
                    btn.className = 'level-btn';
                    // Difficulty class
                    if (i < 3) btn.classList.add('easy');
                    else if (i < 6) btn.classList.add('medium');
                    else if (i < 8) btn.classList.add('hard');
                    else btn.classList.add('expert');

                    btn.innerHTML = `<span class="lv-num">${i + 1}</span><span class="lv-name">${cfg.name}</span>`;
                    btn.addEventListener('click', () => selectLevel(i + 1));
                    levelGrid.appendChild(btn);
                }
            }

            function showLevelSelect() {
                gamePaused = true;
                gameOverOverlay.classList.remove('active');
                pauseOverlay.classList.remove('active');
                levelSelectOverlay.classList.add('active');
                selectedLevelIndex = 0;
                // Focus first button after a tick (dom needs to be visible)
                setTimeout(() => focusLevelButton(0), 50);
            }

            function togglePause() {
                if (gameOver) return;
                if (levelSelectOverlay.classList.contains('active')) return;
                gamePaused = !gamePaused;
                if (gamePaused) {
                    pauseOverlay.classList.add('active');
                } else {
                    pauseOverlay.classList.remove('active');
                }
            }

            buildLevelGrid();
            showLevelSelect();
            gameLoop();

            // Button handlers
            selectLevelBtn.addEventListener('click', () => showLevelSelect());
            pauseBtn.addEventListener('click', () => togglePause());
            restartBtn.addEventListener('click', () => restartGame());

            // Also show level select after game over via overlay click
            gameOverOverlay.addEventListener('click', () => {
                if (gameOver) showLevelSelect();
            });

            // Click pause overlay to unpause
            pauseOverlay.addEventListener('click', () => togglePause());

            // Expose functions to global scope
            window.restartGame = restartGame;
            window.selectLevel = selectLevel;
            window.togglePause = togglePause;

            console.log('🎮 坦克大战已就绪!');
            console.log('操作: 方向键移动, 空格射击, R键重新开始');
            console.log('摧毁所有敌方坦克即可过关!');
        })();
    </script>
</body>
</html>
